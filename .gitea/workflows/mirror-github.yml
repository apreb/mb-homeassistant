name: Mirror to GitHub

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push main + tags to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/apreb/mb-homeassistant.git"
          git push --force "$REMOTE" HEAD:main
          git push --force --tags "$REMOTE"
